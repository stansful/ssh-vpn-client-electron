name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: native/service-go/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check pull-request whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.sha }}"

      - name: Check pushed whitespace
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: git diff --check "${{ github.event.before }}...${{ github.sha }}"

      - name: Check initial commit whitespace
        if: github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000'
        run: git show --check --format=fuller "${{ github.sha }}"

      - name: Test TypeScript
        run: npm test

      - name: Test native service
        run: npm run native:test-service

      - name: Vet native service
        working-directory: native/service-go
        run: go vet ./...

      - name: Build production bundles
        run: npm run build

      - name: Build native runtime for package smoke
        working-directory: native/service-go
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -ldflags="-s -w" -o ../../native/linux/x64/shadow-ssh-service ./cmd/shadow-ssh-service

      - name: Smoke-test Electron package layout
        run: npm run pack:linux-dir-x64 -- --config.directories.output="${RUNNER_TEMP}/electron-package-smoke"

      - name: Verify packaged client runtimes
        run: |
          test -x "${RUNNER_TEMP}/electron-package-smoke/linux-unpacked/resources/native/linux/x64/shadow-ssh-service"
          test -x "${RUNNER_TEMP}/electron-package-smoke/linux-unpacked/resources/xray/linux/x64/xray"
          test ! -e "${RUNNER_TEMP}/electron-package-smoke/linux-unpacked/resources/native/linux/arm64"
          test ! -e "${RUNNER_TEMP}/electron-package-smoke/linux-unpacked/resources/xray/linux/arm64"
          file "${RUNNER_TEMP}/electron-package-smoke/linux-unpacked/resources/native/linux/x64/shadow-ssh-service" | grep -q "x86-64"
          file "${RUNNER_TEMP}/electron-package-smoke/linux-unpacked/resources/xray/linux/x64/xray" | grep -q "x86-64"

  native-cross-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            extension: .exe
          - goos: windows
            goarch: arm64
            extension: .exe
          - goos: darwin
            goarch: amd64
            extension: ""
          - goos: darwin
            goarch: arm64
            extension: ""
          - goos: linux
            goarch: amd64
            extension: ""
          - goos: linux
            goarch: arm64
            extension: ""
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: native/service-go/go.mod

      - name: Cross-build native service
        working-directory: native/service-go
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -o "${RUNNER_TEMP}/shadow-ssh-service-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }}" ./cmd/shadow-ssh-service
